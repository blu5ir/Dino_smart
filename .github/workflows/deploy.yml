name: CI/CD Pipeline - Dino Smart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages-and-deploy"
  cancel-in-progress: true

jobs:
  # 1. CI Job: Code Quality Checks and Testing
  ci-test-lint:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if exist requirements.txt pip install -r requirements.txt

      - name: Lint with flake8
        shell: cmd
        run: |
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Unit Tests with pytest
        shell: cmd
        run: |
          python -m pytest tests/

  # 2. Build Job: Updates build version metadata and packages the application
  build-and-package:
    needs: ci-test-lint
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update Version & Build Metadata
        shell: cmd
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python Dino_smart/update_version.py

      - name: Upload Packaged Code Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dino-smart-app
          path: |
            .
            !.git
            !.github
            !.venv
            !Dino_smart/config.json
            !Dino_smart/database/*.db

  # 3. Deploy Landing Page: Deploys static landing page to GitHub Pages
  deploy-landing-page:
    needs: build-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Static Assets
        shell: cmd
        run: |
          if not exist dist mkdir dist
          copy index.html dist\
          copy style.css dist\
          copy script.js dist\
          if exist assets xcopy /E /I /Y assets dist\assets

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 4. Local Deployment: Deploys Streamlit directly on the self-hosted Windows runner
  deploy-local:
    needs: build-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Requirements
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Version Update
        shell: cmd
        run: |
          python Dino_smart/update_version.py

      - name: Stop Existing Streamlit
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -Command "$processes = Get-CimInstance Win32_Process -Filter \"Name='python.exe'\" | Where-Object { $_.CommandLine -like '*app.py*' -or $_.CommandLine -like '*streamlit*' }; if ($processes) { Write-Host 'Stopping existing Streamlit process(es)...'; $processes | ForEach-Object { Stop-Process -Id $_.ProcessId -Force } } else { Write-Host 'No running Streamlit processes found.' }"

      - name: Start Streamlit
        shell: cmd
        run: |
          start cmd /k "streamlit run Dino_smart/app.py"

      - name: Deployment Complete
        shell: cmd
        run: |
          echo Dino Smart deployed successfully!
