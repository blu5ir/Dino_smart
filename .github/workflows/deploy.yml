name: CI/CD Pipeline - Dino Smart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages-and-deploy"
  cancel-in-progress: true

jobs:
  # 1. CI Job: Code Quality Checks and Testing
  ci-test-lint:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        shell: bash
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Unit Tests with pytest
        shell: bash
        run: |
          python -m pytest tests/

  # 2. Build Job: Updates build version metadata and packages the application
  build-and-package:
    needs: ci-test-lint
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update Version & Build Metadata
        shell: bash
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          python Dino_smart/update_version.py

      - name: Upload Packaged Code Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dino-smart-app
          path: |
            .
            !.git
            !.github
            !.venv
            !Dino_smart/config.json
            !Dino_smart/database/*.db

  # 3. Deploy Landing Page: Deploys static landing page to GitHub Pages
  deploy-landing-page:
    needs: build-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Static Assets
        shell: bash
        run: |
          mkdir -p dist
          cp index.html dist/
          cp style.css dist/
          cp script.js dist/
          if [ -d assets ]; then cp -r assets dist/; fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 4. Local Deployment: Deploys Streamlit directly on the self-hosted Windows runner
  deploy-local:
    needs: build-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Version Update
        shell: powershell
        run: |
          python Dino_smart/update_version.py

      - name: Stop Existing Streamlit
        shell: powershell
        run: |
          # Safely find and stop only the python/streamlit processes running app.py
          # This avoids stopping the GitHub Runner process or other unrelated python workflows
          $processes = Get-CimInstance Win32_Process -Filter "Name='python.exe'" | Where-Object { $_.CommandLine -like "*app.py*" -or $_.CommandLine -like "*streamlit*" }
          if ($processes) {
              Write-Host "Stopping existing Streamlit process(es)..."
              $processes | ForEach-Object { Stop-Process -Id $_.ProcessId -Force }
          } else {
              Write-Host "No running Streamlit processes found."
          }

      - name: Start Streamlit
        shell: powershell
        run: |
          # Spawn a new powershell window running the Streamlit application in the background
          Start-Process powershell -ArgumentList "-NoExit","-Command","streamlit run Dino_smart/app.py"

      - name: Deployment Complete
        shell: powershell
        run: |
          Write-Host "Dino Smart deployed successfully!"
